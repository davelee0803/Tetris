<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>俄羅斯方塊</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #1a1a2e;
  display: flex;
  justify-content: center;
  align-items: center;
  min-height: 100vh;
  font-family: 'Segoe UI', Arial, sans-serif;
}
.game-container {
  background: #16213e;
  padding: 25px 30px;
  border-radius: 16px;
  box-shadow: 0 0 40px rgba(0,0,0,0.5);
  display: flex;
  gap: 30px;
  align-items: flex-start;
}
.main-area { text-align: center; }
canvas#board {
  display: block;
  border: 2px solid #0f3460;
  border-radius: 4px;
  background: #0a0a1a;
}
.sidebar {
  display: flex;
  flex-direction: column;
  gap: 18px;
  min-width: 140px;
}
.info-panel {
  background: #0f3460;
  border-radius: 10px;
  padding: 14px 18px;
  color: #e0e0e0;
}
.info-panel h3 {
  font-size: 13px;
  color: #a0a0c0;
  text-transform: uppercase;
  letter-spacing: 1px;
  margin-bottom: 6px;
}
.info-panel .value {
  font-size: 26px;
  font-weight: bold;
  color: #fff;
  font-variant-numeric: tabular-nums;
}
canvas#nextCanvas {
  display: block;
  margin: 0 auto;
  background: #0a0a1a;
  border-radius: 4px;
}
button {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: 8px;
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: all 0.15s;
  background: #e94560;
  color: #fff;
  letter-spacing: 0.5px;
}
button:hover { background: #d63851; transform: scale(1.02); }
button:active { transform: scale(0.98); }
.controls-hint {
  color: #8080a0;
  font-size: 12px;
  text-align: center;
  line-height: 1.5;
}
</style>
</head>
<body>

<div class="game-container">
  <div class="main-area">
    <canvas id="board" width="300" height="600"></canvas>
  </div>
  <div class="sidebar">
    <div class="info-panel">
      <h3>分數</h3>
      <div class="value" id="score">0</div>
    </div>
    <div class="info-panel">
      <h3>等級</h3>
      <div class="value" id="level">1</div>
    </div>
    <div class="info-panel">
      <h3>行數</h3>
      <div class="value" id="lines">0</div>
    </div>
    <div class="info-panel">
      <h3>下一個</h3>
      <canvas id="nextCanvas" width="120" height="120"></canvas>
    </div>
    <button id="restartBtn">重新開始</button>
    <div class="controls-hint">
      ← → 移動 &nbsp;|&nbsp; ↑ 旋轉<br>
      ↓ 加速 &nbsp;|&nbsp; Space 直接落下
    </div>
  </div>
</div>

<script>
const COLS = 10, ROWS = 20, BLOCK = 30;
const board = document.getElementById('board');
const ctx = board.getContext('2d');
const nextCanvas = document.getElementById('nextCanvas');
const nextCtx = nextCanvas.getContext('2d');

const COLORS = {
  I: '#00f0f0', O: '#f0f000', T: '#a000f0',
  S: '#00f000', Z: '#f00000', J: '#0000f0', L: '#f0a000'
};

const SHAPES = {
  I: [[1,1,1,1]],
  O: [[1,1],[1,1]],
  T: [[0,1,0],[1,1,1]],
  S: [[0,1,1],[1,1,0]],
  Z: [[1,1,0],[0,1,1]],
  J: [[1,0,0],[1,1,1]],
  L: [[0,0,1],[1,1,1]]
};

const PIECE_NAMES = ['I','O','T','S','Z','J','L'];

let grid, currentPiece, nextPiece, score, level, lines, gameOver, fallInterval;
const LOCK_DELAY = 500;

function createGrid() {
  return Array.from({length: ROWS}, () => Array(COLS).fill(0));
}

function randomPiece() {
  const name = PIECE_NAMES[Math.floor(Math.random() * PIECE_NAMES.length)];
  const shape = SHAPES[name].map(row => [...row]);
  return { name, shape };
}

function rotateMatrix(matrix) {
  return matrix[0].map((_, i) => matrix.map(row => row[i]).reverse());
}

function spawnPiece() {
  currentPiece = nextPiece || randomPiece();
  nextPiece = randomPiece();
  currentPiece.x = Math.floor((COLS - currentPiece.shape[0].length) / 2);
  currentPiece.y = 0;
  if (collision(currentPiece.shape, currentPiece.x, currentPiece.y)) {
    gameOver = true;
    clearInterval(fallInterval);
  }
  drawNext();
}

function collision(shape, offX, offY) {
  for (let r = 0; r < shape.length; r++) {
    for (let c = 0; c < shape[r].length; c++) {
      if (shape[r][c]) {
        const x = offX + c, y = offY + r;
        if (x < 0 || x >= COLS || y >= ROWS || (y >= 0 && grid[y][x])) return true;
      }
    }
  }
  return false;
}

function lockPiece() {
  for (let r = 0; r < currentPiece.shape.length; r++) {
    for (let c = 0; c < currentPiece.shape[r].length; c++) {
      if (currentPiece.shape[r][c]) {
        const y = currentPiece.y + r;
        const x = currentPiece.x + c;
        if (y >= 0) grid[y][x] = currentPiece.name;
      }
    }
  }
  clearLines();
  spawnPiece();
  draw();
}

function clearLines() {
  let cleared = 0;
  for (let r = ROWS - 1; r >= 0; ) {
    if (grid[r].every(cell => cell !== 0)) {
      grid.splice(r, 1);
      grid.unshift(Array(COLS).fill(0));
      cleared++;
    } else { r--; }
  }
  if (cleared > 0) {
    const points = [0, 100, 300, 500, 800];
    score += points[cleared] * level;
    lines += cleared;
    level = Math.floor(lines / 10) + 1;
    updateUI();
    resetFallInterval();
  }
}

function move(dx, dy) {
  if (gameOver) return;
  if (!collision(currentPiece.shape, currentPiece.x + dx, currentPiece.y + dy)) {
    currentPiece.x += dx;
    currentPiece.y += dy;
    draw();
  } else if (dy === 1) {
    lockPiece();
    draw();
  }
}

function rotatePiece() {
  if (gameOver) return;
  const rotated = rotateMatrix(currentPiece.shape);
  let offX = currentPiece.x;
  // wall kick
  const kicks = [0, -1, 1, -2, 2];
  for (const kick of kicks) {
    if (!collision(rotated, offX + kick, currentPiece.y)) {
      currentPiece.shape = rotated;
      currentPiece.x += kick;
      draw();
      return;
    }
  }
}

function hardDrop() {
  if (gameOver) return;
  while (!collision(currentPiece.shape, currentPiece.x, currentPiece.y + 1)) {
    currentPiece.y++;
  }
  lockPiece();
  draw();
}

function resetFallInterval() {
  clearInterval(fallInterval);
  const speed = Math.max(50, 800 - (level - 1) * 70);
  fallInterval = setInterval(() => move(0, 1), speed);
}

function updateUI() {
  document.getElementById('score').textContent = score;
  document.getElementById('level').textContent = level;
  document.getElementById('lines').textContent = lines;
}

function draw() {
  ctx.clearRect(0, 0, 300, 600);
  // grid
  for (let r = 0; r < ROWS; r++) {
    for (let c = 0; c < COLS; c++) {
      if (grid[r][c]) {
        ctx.fillStyle = COLORS[grid[r][c]] || '#888';
        ctx.fillRect(c * BLOCK, r * BLOCK, BLOCK - 1, BLOCK - 1);
      }
    }
  }
  // ghost
  if (currentPiece && !gameOver) {
    let ghostY = currentPiece.y;
    while (!collision(currentPiece.shape, currentPiece.x, ghostY + 1)) ghostY++;
    ctx.globalAlpha = 0.25;
    for (let r = 0; r < currentPiece.shape.length; r++) {
      for (let c = 0; c < currentPiece.shape[r].length; c++) {
        if (currentPiece.shape[r][c]) {
          ctx.fillStyle = COLORS[currentPiece.name];
          ctx.fillRect((currentPiece.x + c) * BLOCK, (ghostY + r) * BLOCK, BLOCK - 1, BLOCK - 1);
        }
      }
    }
    ctx.globalAlpha = 1;
    // current piece
    for (let r = 0; r < currentPiece.shape.length; r++) {
      for (let c = 0; c < currentPiece.shape[r].length; c++) {
        if (currentPiece.shape[r][c]) {
          ctx.fillStyle = COLORS[currentPiece.name];
          ctx.fillRect((currentPiece.x + c) * BLOCK, (currentPiece.y + r) * BLOCK, BLOCK - 1, BLOCK - 1);
        }
      }
    }
  }
  // grid lines
  ctx.strokeStyle = 'rgba(255,255,255,0.04)';
  for (let r = 0; r <= ROWS; r++) {
    ctx.beginPath();
    ctx.moveTo(0, r * BLOCK);
    ctx.lineTo(300, r * BLOCK);
    ctx.stroke();
  }
  for (let c = 0; c <= COLS; c++) {
    ctx.beginPath();
    ctx.moveTo(c * BLOCK, 0);
    ctx.lineTo(c * BLOCK, 600);
    ctx.stroke();
  }
  if (gameOver) {
    ctx.fillStyle = 'rgba(0,0,0,0.65)';
    ctx.fillRect(0, 0, 300, 600);
    ctx.fillStyle = '#fff';
    ctx.font = 'bold 28px Arial';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('GAME OVER', 150, 290);
  }
}

function drawNext() {
  nextCtx.clearRect(0, 0, 120, 120);
  if (!nextPiece) return;
  const shape = nextPiece.shape;
  const rows = shape.length, cols = shape[0].length;
  const size = 25;
  const offX = (120 - cols * size) / 2;
  const offY = (120 - rows * size) / 2;
  for (let r = 0; r < rows; r++) {
    for (let c = 0; c < cols; c++) {
      if (shape[r][c]) {
        nextCtx.fillStyle = COLORS[nextPiece.name];
        nextCtx.fillRect(offX + c * size, offY + r * size, size - 1, size - 1);
      }
    }
  }
}

function restart() {
  clearInterval(fallInterval);
  grid = createGrid();
  score = 0; level = 1; lines = 0; gameOver = false;
  nextPiece = randomPiece();
  updateUI();
  spawnPiece();
  resetFallInterval();
  draw();
}

function init() {
  restart();
  document.addEventListener('keydown', e => {
    if (gameOver && e.key === ' ') { restart(); return; }
    switch (e.key) {
      case 'ArrowLeft': case 'a': case 'A': move(-1, 0); break;
      case 'ArrowRight': case 'd': case 'D': move(1, 0); break;
      case 'ArrowDown': case 's': case 'S': move(0, 1); break;
      case 'ArrowUp': case 'w': case 'W': rotatePiece(); break;
      case ' ': e.preventDefault(); hardDrop(); break;
    }
  });
  document.getElementById('restartBtn').addEventListener('click', restart);
}

init();
</script>
</body>
</html>
